<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bank Event Notifier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .checkmark { width:70px;height:70px;stroke:#198754;stroke-width:5;fill:none;stroke-linecap:round;
      stroke-dasharray:100;stroke-dashoffset:100;animation:draw .6s ease forwards; }
    @keyframes draw { to { stroke-dashoffset:0; } }
  </style>
</head>
<body class="bg-light">
<div class="container" style="max-width:420px;margin-top:80px;">
  <div class="card p-4 shadow-sm text-center">
    <h4 class="mb-3">Make a Payment</h4>

    <div id="form">
      <input id="amount" type="number" class="form-control mb-3" placeholder="Amount">
      <button class="btn btn-primary w-100" onclick="pay()">Pay Now</button>
    </div>

    <div id="processing" class="d-none">
      <div class="spinner-border text-primary my-3"></div>
      <p class="text-muted mb-0">Waiting for both services...</p>
    </div>

    <div id="done" class="d-none">
      <svg class="checkmark" viewBox="0 0 52 52"><path d="M14 27 L22 35 L38 18"></path></svg>
      <h5 class="text-success mt-2">Payment Confirmed</h5>
      <p id="detail" class="text-muted small mb-0"></p>
    </div>
  </div>
</div>

<script>
function show(id) {
  ["form", "processing", "done"].forEach(x =>
    document.getElementById(x).classList.toggle("d-none", x !== id));
}

function pay() {
  const amount = document.getElementById("amount").value;
  const txnId = "TXN" + Math.floor(Math.random() * 100000);
  show("processing");
  fetch("/api/event", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ transactionId: txnId, amount: Number(amount) })
  }).then(() => poll(txnId));
}

function poll(txnId) {
  const timer = setInterval(() => {
    fetch("/api/result/" + txnId)
      .then(r => r.json())
      .then(res => {
        if (res.notification && res.fraud) {
          clearInterval(timer);
          document.getElementById("detail").innerText = res.notification + " | " + res.fraud;
          show("done");
        }
      });
  }, 2000);
}
</script>
</body>
</html>
