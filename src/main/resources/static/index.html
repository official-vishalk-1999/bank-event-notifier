<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NovaTrust Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: Arial;
        }

        .container-box {
            height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            transition: 0.3s;
        }

        .glass:hover {
            transform: translateY(-5px);
        }

        .brand {
            color: white;
            font-weight: bold;
        }

        input {
            border-radius: 10px !important;
            border: none;
            padding: 10px;
        }

        input.error {
            border: 2px solid #ff6b6b !important;
        }

        .error-text {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-custom {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            color: white;
        }
    </style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center container-box">

    <div class="text-center">

        <h1 class="brand mb-4">NovaTrust Bank</h1>

        <div class="glass" style="width: 350px;">

            <h4 class="mb-3">Secure Payment</h4>

            <input id="card" class="form-control mb-2" placeholder="Card Number">
            <input id="exp" class="form-control mb-2" placeholder="Expiry (MM/YY)">
            <input id="cvv" class="form-control mb-2" placeholder="CVV">
            <input id="amount" class="form-control mb-3" placeholder="Amount">

            <button id="payBtn" class="btn btn-custom w-100" onclick="pay()">Pay Now</button>

            <p id="error" class="error-text"></p>

        </div>

    </div>

</div>

<script>
    function clearErrors() {
        document.getElementById("error").innerText = "";
        document.querySelectorAll("input").forEach(i => i.classList.remove("error"));
    }

    function setError(msg, fieldId) {
        document.getElementById("error").innerText = msg;
        if (fieldId) document.getElementById(fieldId).classList.add("error");
    }

    function pay() {

        clearErrors();

        let card = document.getElementById("card").value.trim();
        let exp = document.getElementById("exp").value.trim();
        let cvv = document.getElementById("cvv").value.trim();
        let amount = document.getElementById("amount").value.trim();

        // Empty check
        if (!card || !exp || !cvv || !amount) {
            setError("All fields are required");
            return;
        }

        // Card validation
        if (!/^\d{16}$/.test(card)) {
            setError("Card must be 16 digits", "card");
            return;
        }

        // Expiry validation
        if (!/^\d{2}\/\d{2}$/.test(exp)) {
            setError("Expiry must be MM/YY format", "exp");
            return;
        }

        // CVV validation
        if (!/^\d{3}$/.test(cvv)) {
            setError("CVV must be 3 digits", "cvv");
            return;
        }

        // Amount validation
        if (isNaN(amount) || parseFloat(amount) <= 0) {
            setError("Enter valid amount", "amount");
            return;
        }

        let btn = document.getElementById("payBtn");
        btn.disabled = true;
        btn.innerText = "Processing...";

        let maskedCard = "**** **** **** " + card.slice(-4);
        let txnId = "TXN" + Math.floor(Math.random() * 10000);

        let data = {
            transactionId: txnId,
            cardNumber: maskedCard,
            expiry: exp,
            cvv: cvv,
            amount: parseFloat(amount)
        };

        fetch("/api/event", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        })
            .then(res => res.text())
            .then(id => {
                window.location.href = "result.html?txnId=" + id;
            });
    }
</script>

</body>
</html>
