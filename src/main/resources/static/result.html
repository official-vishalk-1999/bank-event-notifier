<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NovaTrust Bank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            font-family: Arial;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .brand {
            color: white;
            font-weight: bold;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #00c6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            stroke: #00ff9d;
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            animation: draw 0.6s ease forwards;
        }

        @keyframes draw {
            from { stroke-dasharray: 100; stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }

        .success-text {
            color: #00ff9d;
            font-weight: bold;
        }

        .result-text {
            color: #dcdde1;
            font-size: 14px;
            white-space: pre-line;
        }
    </style>
</head>

<body>

<div class="d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="text-center">

        <h1 class="brand mb-4">NovaTrust Bank</h1>

        <div class="glass" style="width: 400px;">

            <div id="loaderSection">
                <h4>Processing Payment...</h4>
                <div class="spinner my-3"></div>
            </div>

            <div id="successSection" style="display:none;">
                <svg class="checkmark" viewBox="0 0 52 52">
                    <path d="M14 27 L22 35 L38 18"></path>
                </svg>
                <h4 class="success-text mt-2">Payment Successful</h4>
            </div>

            <p id="result" class="result-text mt-3"></p>

            <button class="btn btn-light mt-3" onclick="goBack()">Back</button>

        </div>

    </div>

</div>

<script>
    const txnId = new URLSearchParams(window.location.search).get("txnId");

    let done = false;

    setInterval(() => {

        fetch("/api/result/" + txnId)
            .then(res => res.text())
            .then(data => {

                let formatted = data.replace(/amount (\d+\.?\d*)/, (m, amt) =>
                    "amount ₹" + Number(amt).toLocaleString("en-IN")
                );

                document.getElementById("result").innerText = formatted;

                if (!done && data.includes("Fraud") && data.includes("Email")) {
                    done = true;

                    document.getElementById("loaderSection").style.display = "none";
                    document.getElementById("successSection").style.display = "block";
                }

            });

    }, 2000);

    function goBack() {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
